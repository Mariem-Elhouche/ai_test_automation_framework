services:

  postgres:
    image: postgres:16-alpine
    container_name: ai_dashboard_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ai_dashboard_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      DASHBOARD_JWT_SECRET: ${DASHBOARD_JWT_SECRET}
      DASHBOARD_JWT_EXPIRE_MINUTES: ${DASHBOARD_JWT_EXPIRE_MINUTES}
      DASHBOARD_PM_EMAIL: ${DASHBOARD_PM_EMAIL}
      DASHBOARD_PM_PASSWORD: ${DASHBOARD_PM_PASSWORD}
      DASHBOARD_PM_PASSWORD_HASH: ${DASHBOARD_PM_PASSWORD_HASH}
      DASHBOARD_PM_DISPLAY_NAME: ${DASHBOARD_PM_DISPLAY_NAME}
      DASHBOARD_QA_EMAIL: ${DASHBOARD_QA_EMAIL}
      DASHBOARD_QA_PASSWORD: ${DASHBOARD_QA_PASSWORD}
      DASHBOARD_QA_PASSWORD_HASH: ${DASHBOARD_QA_PASSWORD_HASH}
      DASHBOARD_QA_DISPLAY_NAME: ${DASHBOARD_QA_DISPLAY_NAME}
      SELF_HEALING_METRICS_URL: ${SELF_HEALING_METRICS_URL}
      SELF_HEALING_METRICS_TIMEOUT_SECONDS: ${SELF_HEALING_METRICS_TIMEOUT_SECONDS}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  dashboard-ui:
    build:
      context: ../dashboard-ui
      dockerfile: Dockerfile
    container_name: ai_dashboard_ui
    ports:
      - "5173:80"
    depends_on:
      dashboard-api:
        condition: service_started

volumes:
  pgdata:
